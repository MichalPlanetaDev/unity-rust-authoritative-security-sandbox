services:
  server:
    build: .
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /workspace
    command: server config/docker.toml
    ports:
      - "4000:4000"
    volumes:
      - .:/workspace

  bot-normal:
    build: .
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /workspace
    environment:
      SERVER_ADDR: server:4000
    command: bot normal
    volumes:
      - .:/workspace
    depends_on:
      - server

  bot-suspicious:
    build: .
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /workspace
    environment:
      SERVER_ADDR: server:4000
    command: bot suspicious
    volumes:
      - .:/workspace
    depends_on:
      - server

  bot-sequence:
    build: .
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /workspace
    environment:
      SERVER_ADDR: server:4000
    command: bot sequence
    volumes:
      - .:/workspace
    depends_on:
      - server

  bot-timing:
    build: .
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /workspace
    environment:
      SERVER_ADDR: server:4000
    command: bot timing
    volumes:
      - .:/workspace
    depends_on:
      - server

  bot-flood:
    build: .
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /workspace
    environment:
      SERVER_ADDR: server:4000
    command: bot flood
    volumes:
      - .:/workspace
    depends_on:
      - server

  bot-bad-protocol:
    build: .
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /workspace
    environment:
      SERVER_ADDR: server:4000
    command: bot bad-protocol
    volumes:
      - .:/workspace
    depends_on:
      - server

  bot-hit:
    build: .
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /workspace
    environment:
      SERVER_ADDR: server:4000
    command: bot hit
    volumes:
      - .:/workspace
    depends_on:
      - server

  bot-bad-hit:
    build: .
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /workspace
    environment:
      SERVER_ADDR: server:4000
    command: bot bad-hit
    volumes:
      - .:/workspace
    depends_on:
      - server

  summary:
    build: .
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /workspace
    command: cli summary samples/session.jsonl
    volumes:
      - .:/workspace

  risk:
    build: .
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /workspace
    command: cli risk samples/session.jsonl
    volumes:
      - .:/workspace

  timeline:
    build: .
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /workspace
    command: cli timeline samples/session.jsonl
    volumes:
      - .:/workspace

  evidence:
    build: .
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /workspace
    command: cli evidence samples/session.jsonl
    volumes:
      - .:/workspace

  export-evidence:
    build: .
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /workspace
    command: cli export-evidence samples/session.jsonl reports/evidence.json reports/evidence.csv
    volumes:
      - .:/workspace

  ingest-db:
    build: .
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /workspace
    command: cli ingest-db samples/session.jsonl reports/investigation.db
    volumes:
      - .:/workspace

  query-db-suspicious:
    build: .
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /workspace
    command: cli query-db suspicious-players reports/investigation.db
    volumes:
      - .:/workspace

  query-db-breakdown:
    build: .
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /workspace
    command: cli query-db violation-breakdown reports/investigation.db
    volumes:
      - .:/workspace

  query-db-player-timeline:
    build: .
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /workspace
    command: cli query-db player-timeline reports/investigation.db 2
    volumes:
      - .:/workspace

  investigation-api:
    build: .
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /workspace
    command: investigation-api serve reports/investigation.db 0.0.0.0:8080
    ports:
      - "8080:8080"
    volumes:
      - .:/workspace

  investigation-api-smoke:
    build: .
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /workspace
    command: investigation-api smoke investigation-api:8080
    volumes:
      - .:/workspace
    depends_on:
      - investigation-api
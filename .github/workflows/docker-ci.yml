name: Docker CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t unity-rust-authoritative-security-sandbox .

      - name: Run Docker demo
        run: ./scripts/docker-demo.sh